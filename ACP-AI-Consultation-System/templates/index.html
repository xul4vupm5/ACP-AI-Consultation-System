<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>預立醫療諮商系統</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            animation: gradientBackground 15s ease infinite;
            background: linear-gradient(-45deg, #76b852, #8DC26F, #D7DDE8, #9FBACD);
            background-size: 400% 400%;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        @keyframes gradientBackground {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        .button {
            display: block;
            width: 200px;
            padding: 10px;
            margin: 10px auto;
            text-align: center;
            text-decoration: none;
            color: #333;
            background-color: rgba(255, 255, 255, 0.8);
            border-radius: 5px;
            cursor: pointer;
            border: none;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 8px rgba(0, 0, 0, 0.2);
        }

        h1 {
            color: white;
            text-align: center;
            padding: 20px;
            background: rgba(161, 157, 157, 0.05);
            border-radius: 5px;
            margin-bottom: 20px;
            width: auto;
            max-width: 90%;
        }
    </style>
</head>

<body>

    <h1>Chat GPT互動式預立醫療照護諮商輔助系統</h1>
    <a href="/course-video" class="button">課程影音</a>
    <a href="/qa" class="button">問答系統</a>
    <a href="/view-data" class="button">問答資料庫</a>
    <!--<a href="/ppt-show" class="button">上課簡報</a>-->
    <!--<a href="/gpt" class="button">聊天</a>-->

</body>

</html>
